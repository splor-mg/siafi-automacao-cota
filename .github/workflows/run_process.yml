name: Run process

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run_process:
    name: Cota
    runs-on: self-hosted
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar Pythoneu workflow pode continuar exatamente assi
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Python dependencies with pip
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install system dependencies for py3270
        run: |
          whoami
          sudo apt-get update
          sudo apt-get install -y s3270 openvpn curl netcat-openbsd

      - name: Run process only after VPN is connected
        env:
          SISTEMA: ${{ secrets.SIAFI_SISTEMA }}
          USUARIO: ${{ secrets.SIAFI_USUARIO }}
          SENHA: ${{ secrets.SIAFI_SENHA }}
          UNIDADE_EXECUTORA: ${{ secrets.SIAFI_UNIDADE_EXECUTORA }}
        run: |
          : "${SISTEMA:?Missing required secret SIAFI_SISTEMA}"
          : "${USUARIO:?Missing required secret SIAFI_USUARIO}"
          : "${SENHA:?Missing required secret SIAFI_SENHA}"
          : "${UNIDADE_EXECUTORA:?Missing required secret SIAFI_UNIDADE_EXECUTORA}"
          python siafi_automacao/cota_orcamentaria.py
